services:
  mongo:
    image: mongo:7
    container_name: getdocumented-mongo
    command: ["mongod", "--bind_ip_all", "--replSet", "rs0"]
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-setup:
    image: mongo:7
    container_name: getdocumented-mongo-setup
    depends_on:
      - mongo
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        until mongosh --host mongo:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1; do
          sleep 2
        done
        mongosh --host mongo:27017 --eval "try { rs.status() } catch (error) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }) }"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: getdocumented-backend
    depends_on:
      - mongo
      - mongo-setup
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: mongodb://mongo:27017/getdocumented?replicaSet=rs0&directConnection=true
      CORS_ORIGIN: "*"
      MAX_FILE_SIZE_MB: 10
    restart: unless-stopped

volumes:
  mongo_data:
